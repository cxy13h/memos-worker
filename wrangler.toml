name = "memos-worker"
compatibility_date = "2025-08-19"
main = "src/index.js"
[assets]
directory = "./src/public"
run_worker_first = [
	"/api/*"
]

[[d1_databases]]
binding = "DB"
database_id = "39dd07f7-c756-41f2-833d-2528991625e3"
database_name = "notes-db"

[[kv_namespaces]]
binding = "NOTES_KV"
id = "4fd315bef07246e3b0c8e13ebce5b317"
preview_id = ""

[[r2_buckets]]
binding = "NOTES_R2_BUCKET"
bucket_name = "notes-r2-bucket"
preview_bucket_name = "notes-files-preview"
